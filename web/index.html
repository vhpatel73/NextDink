<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="nextdink">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>nextdink</title>
  <link rel="manifest" href="manifest.json">
  <!-- Google Maps JavaScript API with Places library -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAg6tV216lYExeG2vU1bXcvf9691oTIIXE&libraries=places&loading=async"></script>

  <!-- Bridge functions: called from Flutter via dart:js -->
  <script>
    // Pickleball-specific fuzzy autocomplete via Places AutocompleteService
    window._placesSearch = function(input, callback) {
      try {
        var service = new google.maps.places.AutocompleteService();
        // Append "pickleball court" to bias results toward relevant venues
        var biasedInput = input + ' pickleball court';
        service.getPlacePredictions(
          {
            input: biasedInput,
            types: ['establishment'],
            componentRestrictions: { country: 'us' }
          },
          function(predictions, status) {
            if (status === 'OK' && predictions && predictions.length > 0) {
              callback(predictions.map(function(p) { return p.description; }));
            } else {
              // Retry without bias if nothing found — user might be typing an address
              service.getPlacePredictions(
                { input: input, types: ['establishment'], componentRestrictions: { country: 'us' } },
                function(p2, s2) {
                  callback((s2 === 'OK' && p2) ? p2.slice(0, 4).map(function(p) { return p.description; }) : []);
                }
              );
            }
          }
        );
      } catch(e) { callback([]); }
    };

    // Nearby pickleball courts via Places NearbySearch
    window._nearbyPickleballCourts = function(lat, lng, callback) {
      try {
        var mapDiv = document.createElement('div');
        var map = new google.maps.Map(mapDiv, { center: { lat: lat, lng: lng }, zoom: 14 });
        var service = new google.maps.places.PlacesService(map);
        service.nearbySearch(
          { location: { lat: lat, lng: lng }, radius: 16000, keyword: 'pickleball' },
          function(results, status) {
            if (results && results.length > 0) {
              callback(results.slice(0, 6).map(function(r) {
                return r.name + (r.vicinity ? ', ' + r.vicinity : '');
              }));
            } else {
              callback([]);
            }
          }
        );
      } catch(e) { callback([]); }
    };
  </script>
</head>
<body>
  <!--

</body>
</html>
